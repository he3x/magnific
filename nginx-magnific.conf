# ============================================================================
# NGINX CONFIGURATION FOR MAGNIFIC KLING V3
# Domain: magnific.he3x.my.id
# Backend: Unix Socket
# ============================================================================

# Upstream configuration - Unix socket
upstream magnific_backend {
    server unix:/tmp/magnific-kling.sock fail_timeout=0;
}

# HTTP Server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name magnific.he3x.my.id;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Server - Main configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name magnific.he3x.my.id;

    # SSL Configuration (will be managed by Certbot)
    # These lines will be automatically added by certbot --nginx
    # ssl_certificate /etc/letsencrypt/live/magnific.he3x.my.id/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/magnific.he3x.my.id/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Upload size limit (100MB for video uploads)
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # Timeouts for long uploads and processing
    client_body_timeout 600s;
    client_header_timeout 600s;
    keepalive_timeout 65s;
    send_timeout 600s;

    # Logging
    access_log /var/log/nginx/magnific.access.log;
    error_log /var/log/nginx/magnific.error.log;

    # Root location - Proxy to Node.js via Unix socket
    location / {
        # Proxy to Unix socket
        proxy_pass http://magnific_backend;
        
        # HTTP version
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Disable caching for dynamic content
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
        
        # Timeouts for long-running requests
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Static files caching (if needed in future)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://magnific_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (optional)
    location /api/health {
        proxy_pass http://magnific_backend;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}